<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePhotoshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components/toolbar.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/layers.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/text-toolbar.css">
</head>

<body>
    <div id="app">
        <header class="toolbar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="logo-icon">
                    <rect x="3" y="3" width="18" height="18" rx="4" fill="var(--accent)" />
                    <circle cx="12" cy="12" r="5" fill="#111116" />
                </svg>
                <span>VibePhotoshop</span>
            </div>
            <div class="menu-bar">
                <div class="menu-item" id="menu-file">
                    <button class="menu-trigger" id="file-menu-btn">File</button>
                    <div class="dropdown-menu hidden" id="file-dropdown">
                        <button class="dropdown-item" id="btn-new">New...</button>
                        <hr class="menu-divider">
                        <button class="dropdown-item" id="btn-open">Open...</button>
                        <button class="dropdown-item" id="btn-save" disabled>Save (Ctrl+S)</button>
                        <button class="dropdown-item" id="btn-save-as" disabled>Save As...</button>
                        <hr class="menu-divider">
                        <button class="dropdown-item" id="btn-import">Import Image...</button>
                        <button class="dropdown-item" id="btn-export" disabled>Export...</button>
                    </div>
                </div>
                <div class="menu-item" id="menu-edit">
                    <button class="menu-trigger" id="edit-menu-btn">Edit</button>
                    <div class="dropdown-menu hidden" id="edit-dropdown">
                        <button class="dropdown-item" id="btn-undo" disabled>Undo (Ctrl+Z)</button>
                        <button class="dropdown-item" id="btn-redo" disabled>Redo (Ctrl+Y)</button>
                        <hr class="menu-divider">
                        <button class="dropdown-item" id="btn-image-size" disabled>Image Size...</button>
                        <button class="dropdown-item" id="btn-canvas-size" disabled>Canvas Size...</button>
                        <hr class="menu-divider">
                        <button class="dropdown-item" id="btn-flip-h" disabled>Flip Horizontal</button>
                        <button class="dropdown-item" id="btn-flip-v" disabled>Flip Vertical</button>
                        <button class="dropdown-item" id="btn-free-transform" disabled>Free Transform... (Ctrl+Alt+T)</button>
                    </div>
                </div>
                <div class="menu-item" id="menu-select">
                    <button class="menu-trigger" id="select-menu-btn">Select</button>
                    <div class="dropdown-menu hidden" id="select-dropdown">
                        <button class="dropdown-item" id="btn-expand-selection" disabled>Expand...</button>
                        <button class="dropdown-item" id="btn-contract-selection" disabled>Contract...</button>
                        <button class="dropdown-item" id="btn-border-selection" disabled>Border...</button>
                        <button class="dropdown-item" id="btn-feather-selection" disabled>Feather...</button>
                    </div>
                </div>
                <!-- Hidden file inputs -->
                <input type="file" id="file-input-vps" accept=".vps" hidden>
                <input type="file" id="file-input-image" accept="image/png, image/jpeg, image/webp" hidden>
            </div>
        </header>

        <div class="app-body">
            <aside id="sidebar-tools">
                <div class="tools-top">
                    <!-- Future tools go here -->
                    <button class="tool-btn" id="tool-move" title="Move Tool (V)" data-tool="move">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                            <polyline points="5 9 2 12 5 15"></polyline>
                            <polyline points="9 5 12 2 15 5"></polyline>
                            <polyline points="19 9 22 12 19 15"></polyline>
                            <polyline points="9 19 12 22 15 19"></polyline>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <line x1="12" y1="2" x2="12" y2="22"></line>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-pencil" title="Pencil Tool (P)" data-tool="pencil">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-brush" title="Brush Tool (B)" data-tool="brush">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            <path d="M9 11a4 4 0 1 1-4 4 4 4 0 0 1 4-4z"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-eraser" title="Eraser Tool (E)" data-tool="eraser">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z"></path>
                            <path d="M10 10L14 14"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-rect-select" title="Rectangular Marquee Tool (M)" data-tool="rect-select">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-dasharray="3 3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-oval-select" title="Oval Marquee Tool (O)" data-tool="oval-select">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-dasharray="3 3">
                            <ellipse cx="12" cy="12" rx="9" ry="7"></ellipse>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-polygon-select" title="Polygon Lasso Tool (L)" data-tool="polygon-select">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                            <polygon points="12 2 21 9 17 21 7 21 3 9"></polygon>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-text" title="Text Tool (T)" data-tool="text">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-eyedropper" title="Eyedropper Tool (I)" data-tool="eyedropper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m2 22 1-1h3l9-9"></path>
                            <path d="M3 21v-3l9-9"></path>
                            <path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l-3-3z"></path>
                            <path d="m15 9-3-3"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="tool-zoom" title="Zoom Tool (Z)" data-tool="zoom">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="11" y1="8" x2="11" y2="14"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </button>
                </div>
                <div class="color-picker-widget">
                    <div class="color-wrapper bg-wrapper">
                        <input type="color" id="bg-color" value="#ffffff" title="Set background color">
                    </div>
                    <div class="color-wrapper fg-wrapper">
                        <input type="color" id="fg-color" value="#000000" title="Set foreground color">
                    </div>
                </div>
            </aside>

            <main id="workspace">
                <div id="properties-bar" class="properties-bar">
                    <!-- Text Toolbar -->
                    <div id="text-toolbar" class="tool-properties hidden">
                        <div class="toolbar-group">
                            <select id="font-family-select" title="Font Family">
                                <option value="Inter" style="font-family: Inter;">Inter</option>
                                <option value="Arial" style="font-family: Arial;">Arial</option>
                                <option value="'Courier New'" style="font-family: 'Courier New';">Courier New</option>
                                <option value="Georgia" style="font-family: Georgia;">Georgia</option>
                                <option value="'Times New Roman'" style="font-family: 'Times New Roman';">Times New Roman</option>
                                <option value="Verdana" style="font-family: Verdana;">Verdana</option>
                            </select>
                            <div class="toolbar-input-group" title="Font Size (px)">
                                <button type="button" class="spin-btn" data-target="font-size-input" data-step="-1">&minus;</button>
                                <input type="number" id="font-size-input" value="24" min="1" max="999">
                                <button type="button" class="spin-btn" data-target="font-size-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <button class="tool-btn text-style-btn" data-command="bold" title="Bold (Ctrl+B)">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                            </button>
                            <button class="tool-btn text-style-btn" data-command="italic" title="Italic (Ctrl+I)">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                            </button>
                            <button class="tool-btn text-style-btn" data-command="strikeThrough" title="Strikethrough">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4H9a3 3 0 0 0-2.83 4"></path><path d="M14 12a4 4 0 0 1 0 8H6"></path><line x1="4" y1="12" x2="20" y2="12"></line></svg>
                            </button>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <button class="tool-btn text-style-btn" data-command="justifyLeft" title="Align Left">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                            </button>
                            <button class="tool-btn text-style-btn" data-command="justifyCenter" title="Align Center">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg>
                            </button>
                            <button class="tool-btn text-style-btn" data-command="justifyRight" title="Align Right">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg>
                            </button>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Letter Spacing (px)">
                                <span>LS</span>
                                <button type="button" class="spin-btn" data-target="letter-spacing-input" data-step="-0.5">&minus;</button>
                                <input type="number" id="letter-spacing-input" value="0" step="0.5">
                                <button type="button" class="spin-btn" data-target="letter-spacing-input" data-step="0.5">&plus;</button>
                            </div>
                            <div class="toolbar-input-group" title="Line Spacing">
                                <span>LH</span>
                                <button type="button" class="spin-btn" data-target="line-height-input" data-step="-0.1">&minus;</button>
                                <input type="number" id="line-height-input" value="1.2" step="0.1" min="0.1">
                                <button type="button" class="spin-btn" data-target="line-height-input" data-step="0.1">&plus;</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Brush Toolbar -->
                    <div id="brush-toolbar" class="tool-properties hidden">
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Brush Radius (px)">
                                <span>Size</span>
                                <button type="button" class="spin-btn" data-target="brush-radius-input" data-step="-1">&minus;</button>
                                <input type="number" id="brush-radius-input" value="20" min="1" max="1000">
                                <button type="button" class="spin-btn" data-target="brush-radius-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Brush Hardness (%)">
                                <span>Hardness</span>
                                <input type="range" id="brush-hardness-slider" value="50" min="0" max="100">
                                <button type="button" class="spin-btn" data-target="brush-hardness-input" data-step="-1">&minus;</button>
                                <input type="number" id="brush-hardness-input" value="50" min="0" max="100" style="width: 40px;">
                                <button type="button" class="spin-btn" data-target="brush-hardness-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Brush Strength/Flow (%)">
                                <span>Strength</span>
                                <input type="range" id="brush-strength-slider" value="100" min="1" max="100">
                                <button type="button" class="spin-btn" data-target="brush-strength-input" data-step="-1">&minus;</button>
                                <input type="number" id="brush-strength-input" value="100" min="1" max="100" style="width: 40px;">
                                <button type="button" class="spin-btn" data-target="brush-strength-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Brush Spacing (%)">
                                <span>Spacing</span>
                                <input type="range" id="brush-spacing-slider" value="25" min="1" max="100">
                                <button type="button" class="spin-btn" data-target="brush-spacing-input" data-step="-1">&minus;</button>
                                <input type="number" id="brush-spacing-input" value="25" min="1" max="100" style="width: 40px;">
                                <button type="button" class="spin-btn" data-target="brush-spacing-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Eraser Toolbar -->
                    <div id="eraser-toolbar" class="tool-properties hidden">
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Eraser Radius (px)">
                                <span>Size</span>
                                <button type="button" class="spin-btn" data-target="eraser-radius-input" data-step="-1">&minus;</button>
                                <input type="number" id="eraser-radius-input" value="20" min="1" max="1000">
                                <button type="button" class="spin-btn" data-target="eraser-radius-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Eraser Hardness (%)">
                                <span>Hardness</span>
                                <input type="range" id="eraser-hardness-slider" value="100" min="0" max="100">
                                <button type="button" class="spin-btn" data-target="eraser-hardness-input" data-step="-1">&minus;</button>
                                <input type="number" id="eraser-hardness-input" value="100" min="0" max="100" style="width: 40px;">
                                <button type="button" class="spin-btn" data-target="eraser-hardness-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Eraser Strength/Flow (%)">
                                <span>Strength</span>
                                <input type="range" id="eraser-strength-slider" value="100" min="1" max="100">
                                <button type="button" class="spin-btn" data-target="eraser-strength-input" data-step="-1">&minus;</button>
                                <input type="number" id="eraser-strength-input" value="100" min="1" max="100" style="width: 40px;">
                                <button type="button" class="spin-btn" data-target="eraser-strength-input" data-step="1">&plus;</button>
                            </div>
                        </div>
                        <div class="toolbar-divider"></div>
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Eraser Shape">
                                <span>Shape</span>
                                <select id="eraser-shape-select" style="background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 2px;">
                                    <option value="circle">Circle</option>
                                    <option value="square">Square</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Eyedropper Toolbar -->
                    <div id="eyedropper-toolbar" class="tool-properties hidden">
                        <div class="toolbar-group">
                            <div class="toolbar-input-group" title="Sample Size">
                                <span>Sample Size</span>
                                <select id="eyedropper-sample-size" style="background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 2px;">
                                    <option value="1">Point Sample</option>
                                    <option value="3">3x3 Average</option>
                                    <option value="5">5x5 Average</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="canvas-wrapper">
                    <div id="canvas-stack">
                        <!-- Layer canvases injected dynamically here -->
                        <div id="transform-box" class="hidden">
                            <canvas id="transform-content"></canvas>
                            <div class="rotation-zone"></div>
                            <div class="move-zone"></div>
                            
                            <!-- 8 handles -->
                            <div class="handle top-left" data-handle="tl"></div>
                            <div class="handle top-center" data-handle="tc"></div>
                            <div class="handle top-right" data-handle="tr"></div>
                            <div class="handle center-left" data-handle="cl"></div>
                            <div class="handle center-right" data-handle="cr"></div>
                            <div class="handle bottom-left" data-handle="bl"></div>
                            <div class="handle bottom-center" data-handle="bc"></div>
                            <div class="handle bottom-right" data-handle="br"></div>
                        </div>
                        <div id="text-editor" class="hidden" contenteditable="true" spellcheck="false"></div>
                    </div>
                    <div id="no-image-state">
                        <p>Open an image to start editing</p>
                    </div>
                </div>
            </main>

            <aside id="sidebar-right" class="layers-panel">
                <div id="layers-resizer" class="panel-resizer"></div>
                <div class="panel-header">
                    <h3 class="panel-title">Layers</h3>
                    <button class="tool-btn" id="btn-add-layer" title="New Layer" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="layers-list" id="layers-list">
                    <!-- Layer items injected here -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Brush Custom Cursor -->
    <div id="brush-cursor" class="hidden"></div>

    <!-- Eraser Custom Cursor -->
    <div id="eraser-cursor" class="hidden"></div>

    <!-- Modals -->
    <dialog id="new-canvas-modal" class="modal">
        <form method="dialog" id="new-canvas-form">
            <h2>New Canvas</h2>
            <div class="form-group">
                <label for="canvas-width">Width (px)</label>
                <input type="number" id="canvas-width" name="width" value="800" min="1" max="10000" required>
            </div>
            <div class="form-group">
                <label for="canvas-height">Height (px)</label>
                <input type="number" id="canvas-height" name="height" value="600" min="1" max="10000" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-new">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </dialog>

    <dialog id="image-size-modal" class="modal">
        <form method="dialog" id="image-size-form">
            <h2>Image Size</h2>
            <div class="form-group">
                <label for="image-size-width">Width (px)</label>
                <input type="number" id="image-size-width" name="width" min="1" max="10000" required>
            </div>
            <div class="form-group">
                <label for="image-size-height">Height (px)</label>
                <input type="number" id="image-size-height" name="height" min="1" max="10000" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-image-size">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>
            </div>
        </form>
    </dialog>

    <dialog id="canvas-size-modal" class="modal">
        <form method="dialog" id="canvas-size-form">
            <h2>Canvas Size</h2>
            <div class="form-group">
                <label for="resize-canvas-width">Width (px)</label>
                <input type="number" id="resize-canvas-width" name="width" min="1" max="10000" required>
            </div>
            <div class="form-group">
                <label for="resize-canvas-height">Height (px)</label>
                <input type="number" id="resize-canvas-height" name="height" min="1" max="10000" required>
            </div>
            
            <div class="anchor-section">
                <label>Anchor Location</label>
                <div class="anchor-grid" id="anchor-grid-selector">
                    <button type="button" class="anchor-btn" data-anchor="top-left"></button>
                    <button type="button" class="anchor-btn" data-anchor="top-center"></button>
                    <button type="button" class="anchor-btn" data-anchor="top-right"></button>
                    <button type="button" class="anchor-btn" data-anchor="center-left"></button>
                    <button type="button" class="anchor-btn active" data-anchor="center"></button>
                    <button type="button" class="anchor-btn" data-anchor="center-right"></button>
                    <button type="button" class="anchor-btn" data-anchor="bottom-left"></button>
                    <button type="button" class="anchor-btn" data-anchor="bottom-center"></button>
                    <button type="button" class="anchor-btn" data-anchor="bottom-right"></button>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-canvas-size">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>
            </div>
        </form>
    </dialog>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-expand-selection">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>

            </div>
            <div class="modal-actions">

    <dialog id="border-selection-modal" class="modal">
        <form method="dialog" id="border-selection-form">

            <div class="modal-actions">

    </dialog>

    <dialog id="feather-selection-modal" class="modal">

            <h2>Feather Selection</h2>
            <div class="form-group">
                <label for="feather-pixels">Radius (px)</label>
                <input type="number" id="feather-pixels" name="pixels" value="5" min="1" max="1000" required>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-feather-selection">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>
            </div>
        </form>
    </dialog>

    <!-- Layer Context Menu -->
    <div id="layer-context-menu" class="hidden">
        <button id="ctx-duplicate-layer">Duplicate Layer</button>
